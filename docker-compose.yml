services:
  postgres:
    image: postgres:16-alpine
    container_name: corruner-postgres
    environment:
      POSTGRES_DB: corruner_plan
      POSTGRES_USER: corruner
      POSTGRES_PASSWORD: corruner_secret
    ports:
      - "5432:5432"
    volumes:
      - corruner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corruner -d corruner_plan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  corruner_postgres_data:
