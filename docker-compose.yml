services:
  postgres:
    image: postgres:16-alpine
    container_name: corunner-postgres
    environment:
      POSTGRES_DB: corunner_plan
      POSTGRES_USER: corunner
      POSTGRES_PASSWORD: corunner_secret
    ports:
      - "5432:5432"
    volumes:
      - corunner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corunner -d corunner_plan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  corunner_postgres_data:
